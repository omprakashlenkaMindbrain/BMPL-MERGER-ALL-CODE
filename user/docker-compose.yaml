# version: "3.8"

services:
  app:
    build:
      context: ./user
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: mysql://root:${DB_PASSWORD:-secret}@db:3306/${DB_NAME:-mlmapp}
      NODE_ENV: dev
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3000"
    restart: always

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_NAME:-mlmapp}
    ports:
      - "33061:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - 8080:80
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=${DB_PASSWORD:-secret}

volumes:
  db-data:
